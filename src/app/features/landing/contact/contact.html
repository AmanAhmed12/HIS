<section id="contact" class="section contact-section">
  <div class="container contact-grid">
    <div class="contact-info">
      <div class="hero-subtitle" style="color: var(--secondary);">Get In Touch</div>
      <h2>Contact Us</h2>
      <p>We're here to answer any questions you may have about our curriculum, admissions process, or campus life.</p>
      
      <div class="info-item">
        <div class="info-icon">📍</div>
        <div class="info-details">
          <h4>Address</h4>
          <p>Rest Harrow Estate, Teldeniya Road<br>Madawala Bazaar, Kandy, Sri Lanka</p>
        </div>
      </div>

      <div class="info-item">
        <div class="info-icon">📞</div>
        <div class="info-details">
          <h4>Phone</h4>
          <p>081 247 6600 <br> 081 247 0216</p>
        </div>
      </div>

      <div class="info-item">
        <div class="info-icon">✉️</div>
        <div class="info-details">
          <h4>Email</h4>
          <p>hillcountryintl03@yahoo.com</p>
        </div>
      </div>
    </div>
    
    <div class="contact-form-container">
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" class="form-control" placeholder="How can we help you?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" (click)="$event.preventDefault()">Send Message</button>
      </form>
    </div>
  </div>
</section>
