<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <img src="/images/logo.png" alt="School Logo" class="login-logo">
      <h1>Admin Portal</h1>
      <p>Hill Country International School</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      @if (errorMessage()) {
        <div class="alert alert-error">{{ errorMessage() }}</div>
      }

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" class="form-control"
               [(ngModel)]="credentials.username" name="username"
               placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" class="form-control"
               [(ngModel)]="credentials.password" name="password"
               placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary login-btn" [disabled]="isLoading()">
        @if (isLoading()) { Signing in... } @else { Sign In }
      </button>
    </form>

    <a routerLink="/" class="back-link">← Back to Website</a>
  </div>
</div>
