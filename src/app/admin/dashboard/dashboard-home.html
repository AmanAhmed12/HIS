<header class="admin-header">
  <h1>Dashboard</h1>
  <span>Welcome back!</span>
</header>

<div class="dashboard-grid">
  <div class="stat-card">
    <div class="stat-icon">📰</div>
    <div class="stat-info">
      <h3>News & Events</h3>
      <p class="stat-number">12</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">📢</div>
    <div class="stat-info">
      <h3>Announcements</h3>
      <p class="stat-number">8</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">✉️</div>
    <div class="stat-info">
      <h3>Unread Messages</h3>
      <p class="stat-number">5</p>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🖼️</div>
    <div class="stat-info">
      <h3>Gallery Items</h3>
      <p class="stat-number">24</p>
    </div>
  </div>
</div>

<div class="quick-actions">
  <h2>Quick Actions</h2>
  <div class="action-grid">
    <a routerLink="/admin/dashboard/news" class="action-card">
      <span class="action-icon">📰</span>
      <span>Manage News</span>
    </a>
    <a routerLink="/admin/dashboard/gallery" class="action-card">
      <span class="action-icon">🖼️</span>
      <span>Manage Gallery</span>
    </a>
    <a routerLink="/admin/dashboard/announcements" class="action-card">
      <span class="action-icon">📢</span>
      <span>Announcements</span>
    </a>
    <a routerLink="/admin/dashboard/school-info" class="action-card">
      <span class="action-icon">🏫</span>
      <span>School Info</span>
    </a>
  </div>
</div>
