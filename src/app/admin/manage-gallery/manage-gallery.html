<div class="admin-page">
  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h1>🖼️ Manage Gallery</h1>
      <p>Upload and manage school gallery images.</p>
    </div>
    <div class="header-actions">
      <a routerLink="/admin/dashboard" class="btn btn-outline">← Dashboard</a>
      <button class="btn btn-primary">+ Upload Image</button>
    </div>
  </div>

  <!-- Upload Section -->
  <div class="upload-section">
    <div class="upload-area">
      <div class="upload-icon">📤</div>
      <h3>Drag & Drop Images</h3>
      <p>or click to browse files</p>
      <button class="btn btn-secondary">Select Files</button>
    </div>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-grid">
    <div class="gallery-item">
      <div class="gallery-image">
        <img src="/images/gallery1.jpg" alt="Gallery Image">
        <div class="gallery-overlay">
          <button class="btn-icon edit">✏️</button>
          <button class="btn-icon delete">🗑️</button>
        </div>
      </div>
      <div class="gallery-info">
        <h4>Sports Day 2024</h4>
        <p>Annual Sports Day</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="gallery-image">
        <img src="/images/gallery2.jpg" alt="Gallery Image">
        <div class="gallery-overlay">
          <button class="btn-icon edit">✏️</button>
          <button class="btn-icon delete">🗑️</button>
        </div>
      </div>
      <div class="gallery-info">
        <h4>Science Fair</h4>
        <p>Student Projects</p>
      </div>
    </div>
    <div class="gallery-item">
      <div class="gallery-image">
        <img src="/images/gallery3.jpg" alt="Gallery Image">
        <div class="gallery-overlay">
          <button class="btn-icon edit">✏️</button>
          <button class="btn-icon delete">🗑️</button>
        </div>
      </div>
      <div class="gallery-info">
        <h4>Cultural Day</h4>
        <p>International Day Celebration</p>
      </div>
    </div>
  </div>
</div>
